<?xml version="1.0" encoding="UTF-8"?>
<!--
  Wordmark only. System fonts (no external @import — that was blurring
  under GitHub's SVG sanitizer). One crimson accent on the "-ssh" half,
  thin underline bar, one-line tagline. Sits quiet under the dramatic
  repo-image.png so the image does the visual work.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="1200" height="200" role="img" aria-label="claude-code-ssh — SSH for Claude Code">
  <defs>
    <style>
      .mono   { font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace; }
      .sans   { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
      .fg     { fill: #1F2937; }
      .dim    { fill: #6B7280; }
      .accent { fill: #C72C2C; }
      @media (prefers-color-scheme: dark) {
        .fg     { fill: #E6E9EF; }
        .dim    { fill: #9AA3AF; }
        .accent { fill: #FF6B5C; }
      }
    </style>
  </defs>

  <!-- Wordmark: one line, centered. Accent on "-ssh". -->
  <text x="600" y="96" text-anchor="middle" class="mono" font-weight="700" font-size="64" letter-spacing="-1.5">
    <tspan class="fg">claude-code</tspan><tspan class="accent">-ssh</tspan>
  </text>

  <!-- Narrow accent bar under the wordmark -->
  <rect x="540" y="116" width="120" height="3" rx="1.5" class="accent"/>

  <!-- Single tagline -->
  <text x="600" y="158" text-anchor="middle" class="sans dim" font-size="18" font-weight="400">
    SSH for Claude Code
  </text>
</svg>
